version: '3.8'

services:
  go_cli:
    build:
      context: .
      dockerfile: Dockerfile.go
    container_name: go_cli
    depends_on:
      - mongodb
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: root
      MONGO_PASSWORD: example

  python_cli:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: python_cli
    depends_on:
      - mongodb
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: root
      MONGO_PASSWORD: example
    ports: # Add this section
      - "5000:5000" # Map host port 5000 to container port 5000

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example